<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digimon Trials Dex</title>


<style>
/* =====================
   THEME
===================== */
:root {
  --bg-main: #0c0f14;
  --bg-panel: #151922;
  --bg-card: #1b2130;
  --bg-elevated: #222a3a;
  --bg-subtle: #10141c;

  --text-main: #f3f6ff;
  --text-dim: #9aa4b8;

  --border: rgba(255,255,255,0.06);
  --accent: #6ea8ff;
}

/* =====================
   BASE
===================== */
body {
  margin: 0;
  padding: 30px 16px;
  background: radial-gradient(circle at top, #111622, #0b0f15 60%);
  color: var(--text-main);
  font-family: system-ui, -apple-system, sans-serif;
  line-height: 1.5;
}

.app {
  max-width: 1400px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  margin: 0;
  font-size: 2.4rem;
  letter-spacing: 1px;
}

.subtitle {
  text-align: center;
  color: var(--text-dim);
  margin: 6px 0 30px;
}

/* =====================
   NAV
===================== */
.nav {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.nav a,
.dropdown-toggle {
  padding: 8px 18px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text-main);
  text-decoration: none;
  font-size: 0.85rem;
  cursor: pointer;
  transition: 0.2s ease;
}

.nav a:hover,
.dropdown-toggle:hover {
  background: var(--bg-elevated);
  border-color: var(--accent);
}

/* Dropdown */
.dropdown {
  position: relative;
}

.dropdown-menu {
  position: absolute;
  top: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  display: none;
  flex-direction: column;
  min-width: 140px;
  z-index: 10;
}

.dropdown:hover .dropdown-menu {
  display: flex;
}

.dropdown-menu a {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 0.85rem;
}

.dropdown-menu a:hover {
  background: var(--bg-elevated);
}

/* =====================
   SEARCH + FILTERS
===================== */
.search-box {
  display: block;
  margin: 0 auto 24px;
  width: 100%;
  max-width: 620px;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: white;
  font-size: 1rem;
}

.filters {
  margin-bottom: 28px;
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.filter-group label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.filter-group select {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: white;
  padding: 8px 10px;
  border-radius: 10px;
  min-width: 130px;
}

#clearFilters {
  align-self: flex-end;
  padding: 8px 18px;
  border-radius: 999px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  transition: 0.2s;
}

#clearFilters:hover {
  background: var(--bg-elevated);
  color: white;
}

/* =====================
   DEX GRID
===================== */
#dex {
  max-width: 1250px;
  margin: 0 auto;
}

.dex-grid {
  display: grid;
}

#dex {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 22px;
}

/* =====================
   CARD DESIGN
===================== */
.entry {
  background: linear-gradient(145deg, #1b2130, #171c28);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  transition: 0.25s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.entry:hover {
  transform: translateY(-6px);
  border-color: var(--accent);
  box-shadow: 0 15px 35px rgba(0,0,0,0.45);
}

/* Image zone */
.entry > div[style*="text-align:center"] {
  background: var(--bg-subtle);
  border-radius: 14px;
  height: 150px;
  display: flex !important;
  align-items: center;
  justify-content: center;
  margin: 12px 0 14px !important;
  padding: 10px;
}

.entry img {
  max-width: 100% !important;
  max-height: 100% !important;
  object-fit: contain;
}

/* Header */
.entry-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.entry-title {
  font-size: 1.15rem;
  font-weight: 700;
}

.stage {
  font-size: 0.65rem;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg-elevated);
  color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
}

/* Types */
.types {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 8px 0 12px;
}

.type {
  padding: 4px 9px;
  font-size: 0.65rem;
  font-weight: 700;
  border-radius: 999px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  text-transform: uppercase;
}


/* =====================
   TYPE COLORS
===================== */

/* Base type pill */
.type {
  padding: 4px 10px;
  font-size: 0.65rem;
  font-weight: 700;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid currentColor;
  background: rgba(255,255,255,0.04);
}

/* TYPE COLORS */
.normal  { color:#cfd8dc; }
.fire    { color:#ff8a65; }
.water   { color:#64b5f6; }
.ice     { color:#4dd0e1; }
.electric{ color:#ffee58; }
.grass   { color:#81c784; }
.bug     { color:#aed581; }
.fighting{ color:#ef5350; }
.flying  { color:#90caf9; }
.dark    { color:#9575cd; }
.holy    { color:#fff59d; }
.dragon  { color:#7986cb; }
.steel   { color:#b0bec5; }
.poison  { color:#ba68c8; }
.ground  { color:#bc8f6a; }
.fairy   { color:#f48fb1; }
.magic   { color:#ec407a; }
.undead  { color:#7e57c2; }
.chaos   { color:#26c6da; }
.rock    { color:#91543c; }
.null {
  color: #9e9e9e;
  border-style: dashed;
  opacity: 0.75;
}   

/* Description */
.entry-desc {
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.4;
  margin-bottom: 14px;
  flex-grow: 1;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Evo Strip */
.evo-strip {
  border-top: 1px solid var(--border);
  padding-top: 10px;
  font-size: 0.75rem;
  color: var(--text-dim);
}

.evo-strip strong {
  display: block;
  margin-bottom: 4px;
  color: var(--text-main);
  font-size: 0.7rem;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* =====================
   MODAL
===================== */
/* =====================
   MODAL FIXED + IMPROVED
===================== */

/* Hidden state (THIS is what was missing) */
.hidden {
  display: none !important;
}

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 9999;
  animation: fadeIn 0.2s ease forwards;
}

/* Modal box */
.modal {
  width: min(92vw, 760px);
  max-height: 88vh;
  overflow-y: auto;
  background: linear-gradient(145deg, #1a2130, #141a26);
  border-radius: 22px;
  padding: 30px;
  border: 1px solid var(--border);
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
  animation: scaleIn 0.2s ease forwards;
}

/* Scrollbar styling */
.modal::-webkit-scrollbar {
  width: 8px;
}

.modal::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
}

/* Headings inside modal */
.modal h2 {
  margin-top: 0;
}

.modal h3 {
  margin-top: 22px;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes scaleIn {
  from { 
    transform: scale(0.95);
    opacity: 0;
  }
  to { 
    transform: scale(1);
    opacity: 1;
  }
}
/* =====================
   MOBILE
===================== */
@media (max-width: 520px) {
  #dex {
    grid-template-columns: 1fr;
  }

  .entry > div[style*="text-align:center"] {
    height: 170px;
  }
}
</style>
</head>

<body>
<div class="app">

<h1>DIGIMON TRIALS DEX</h1>
<div class="subtitle">Fanmade Digimon ROM Hack</div>

<div class="nav">
  <a href="credits.html">CREDITS</a>
  <div class="dropdown">
    <button class="dropdown-toggle">GUIDE ▾</button>
    <div class="dropdown-menu">
      <a href="encounter.html">Encounters</a>
      <a href="faq.html">FAQ</a>
    </div>
  </div>
</div>

<input id="search" class="search-box" placeholder="Search Digimon...">

<div class="filters">
  <div class="filter-group">
    <label>Stage</label>
    <select id="stageFilter">
      <option value="">All</option>
      <option value="child">Child</option>
      <option value="adult">Adult</option>
      <option value="perfect">Perfect</option>
      <option value="mega">Mega</option>
      <option value="ultra">Ultra</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Type</label>
    <select id="typeFilter">
      <option value="">All</option>
      <option value="fire">Fire</option>
      <option value="water">Water</option>
      <option value="grass">Grass</option>
      <option value="electric">Electric</option>
      <option value="dark">Dark</option>
      <option value="holy">Holy</option>
      <option value="ground">Ground</option>
      <option value="rock">Rock</option>
      <option value="fairy">Fairy</option>
      <option value="undead">Undead</option>
      <option value="steel">Steel</option>
      <option value="poison">Poison</option>
      <option value="bug">Bug</option>
      <option value="magic">Magic</option>
      <option value="ice">Ice</option>
      <option value="flying">Flying</option>
      <option value="dragon">Dragon</option>
      <option value="mystery">Mystery</option>
    </select>
  </div>

  <button id="clearFilters">Clear Filters</button>
</div>

<div id="dex"></div>
</div>

<div id="overlay" class="overlay hidden">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* =====================
   STATE + DOM
===================== */
let DATA = [];

const dexEl = document.getElementById("dex");
const overlay = document.getElementById("overlay");
const searchInput = document.getElementById("search");
const stageFilter = document.getElementById("stageFilter");
const typeFilter = document.getElementById("typeFilter");
const clearBtn = document.getElementById("clearFilters");

/* =====================
   LOAD FROM digidex/
===================== */
async function loadDex() {
  try {
    const res = await fetch("digidex/11AA_index.json");
    if (!res.ok) throw new Error("Failed to load 11AA_index.json");

    const { entries } = await res.json();
    if (!Array.isArray(entries)) throw new Error("Invalid index format");

    const loaded = [];

    for (const slug of entries) {
      try {
        const r = await fetch(`digidex/${slug}.json`);
        if (!r.ok) throw new Error();

        const data = await r.json();
        loaded.push(data);
      } catch {
        console.warn("Skipped broken entry:", slug);
      }
    }

    DATA = normalizeDex(loaded);
    render(DATA);

  } catch (err) {
    showError("DEX LOAD FAILED:\n\n" + err.message);
  }
}

loadDex();

/* =====================
   ERROR DISPLAY
===================== */
function showError(msg) {
  const div = document.createElement("div");
  div.style.cssText = `
    background:#4a0000;
    color:#ffcccc;
    padding:16px;
    margin:20px auto;
    max-width:720px;
    border-radius:10px;
    white-space:pre-wrap;
  `;
  div.textContent = msg;
  document.querySelector(".app").prepend(div);
}

/* =====================
   NORMALIZATION
===================== */
function normalizeDex(raw) {
  if (!Array.isArray(raw)) return [];

  const seen = new Set();
  const clean = [];

  for (const d of raw) {
    if (!d || typeof d !== "object") continue;
    if (!d.name || seen.has(d.name)) continue;

    seen.add(d.name);

    clean.push({
      name: String(d.name),
      stage: normalizeStage(d.stage),
      types: normalizeTypes(d.types),
      description: d.description || "(no description)",
      image: d.image ? `image/${d.image}` : null,
      abilities: Array.isArray(d.abilities) ? d.abilities : [],
      evolves_to: Array.isArray(d.evolves_to) ? d.evolves_to : []
    });
  }

  return clean.sort((a,b)=>a.name.localeCompare(b.name));
}

function normalizeStage(s) {
  if (!s) return "";
  const str = String(s).toLowerCase();
  if (str.includes("child") || str.includes("rookie")) return "child";
  if (str.includes("adult") || str.includes("champion")) return "adult";
  if (str.includes("perfect") || str.includes("ultimate")) return "perfect";
  if (str.includes("mega")) return "mega";
  if (str.includes("ultra")) return "ultra";
  return str;
}

function normalizeTypes(types) {
  if (!Array.isArray(types)) return [];
  return types.map(t => String(t).toLowerCase().trim()).filter(Boolean);
}

/* =====================
   RENDER
===================== */
function render(list) {
  dexEl.innerHTML = "";

  if (!list.length) {
    dexEl.innerHTML = `
      <div style="text-align:center; padding:60px; color:var(--text-dim);">
        No Digimon match your filters
      </div>`;
    return;
  }

  for (const d of list) {
    const card = document.createElement("div");
    card.className = "entry";

    card.innerHTML = `
      <div class="entry-header">
        <div class="entry-title">${d.name}</div>
        <div class="stage">${capitalize(d.stage) || "—"}</div>
      </div>

      ${d.image ? `
        <div style="text-align:center; margin:10px 0;">
          <img src="${d.image}"
               style="max-height:110px; max-width:100%; object-fit:contain;">
        </div>
      ` : ""}

      <div class="types">
${(() => {
  if (!d.types.length) {
    return '<span style="opacity:.5">—</span>';
  }

  // Clone to avoid mutating original
  const types = [...d.types];

  // If there are 2 types and second is null → remove it
  if (types.length > 1 && types[1] === "null") {
    types.splice(1, 1);
  }

  return types.map(t => `
    <span class="type ${t}">
      ${capitalize(t)}
    </span>
  `).join("");
})()}
      </div>

      <div class="entry-desc">${d.description}</div>

      <div class="evo-strip">
        <strong>Digivolves To</strong>
        ${
          d.evolves_to.length
            ? `<ul style="margin:4px 0 0 16px;">
                ${d.evolves_to.map(e =>
                  `<li>${e.name}${e.condition ? " — " + e.condition : ""}</li>`
                ).join("")}
              </ul>`
            : " —"
        }
      </div>
    `;

    card.addEventListener("click", () => openModal(d));
    dexEl.appendChild(card);
  }
}

/* =====================
   MODAL
===================== */
function openModal(d) {
  document.getElementById("modal-title").textContent = d.name;

  let html = `<p>${d.description}</p>`;

  if (d.abilities.length) {
    html += `
      <h3>Abilities</h3>
      <ul>
        ${d.abilities.map(a => `<li>${a}</li>`).join("")}
      </ul>`;
  }

  if (d.evolves_to.length) {
    html += `
      <h3>Evolution Path</h3>
      <ul>
        ${d.evolves_to.map(e =>
          `<li>${e.name}${e.condition ? " — " + e.condition : ""}</li>`
        ).join("")}
      </ul>`;
  }

  document.getElementById("modal-body").innerHTML = html;
  overlay.classList.remove("hidden");
}

overlay.addEventListener("click", e => {
  if (e.target === overlay) overlay.classList.add("hidden");
});

/* =====================
   FILTERING
===================== */
function applyFilters() {
  const q = searchInput.value.toLowerCase().trim();

  const filtered = DATA.filter(d => {
    const textBlob = (
      d.name +
      d.description +
      d.abilities.join("") +
      d.evolves_to.map(e => e.name + (e.condition || "")).join("")
    ).toLowerCase();

    const matchesSearch = !q || textBlob.includes(q);
    const matchesStage = !stageFilter.value || d.stage === stageFilter.value;
    const matchesType = !typeFilter.value || d.types.includes(typeFilter.value);

    return matchesSearch && matchesStage && matchesType;
  });

  render(filtered);
}

searchInput.addEventListener("input", applyFilters);
stageFilter.addEventListener("change", applyFilters);
typeFilter.addEventListener("change", applyFilters);

clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  stageFilter.value = "";
  typeFilter.value = "";
  render(DATA);
});

/* =====================
   UTIL
===================== */
function capitalize(str) {
  if (!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}
</script>
</body>
</html>
