<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digimon Trials Dex</title>

<style>

/* =====================
   THEME
===================== */
:root {
  --bg-main:    #0f1115;
  --bg-panel:   #171a21;
  --bg-card:    #1f2430;
  --bg-subtle:  #232838;
  --text-main:  #f2f4f8;
  --text-dim:   #a8b0c2;
  --border:     rgba(255,255,255,0.08);
  --shadow:     0 8px 24px rgba(0,0,0,0.35);
  --shadow-hover: 0 16px 40px rgba(0,0,0,0.5);
}

/* =====================
   BASE
===================== */
body {
  margin: 0;
  padding: 32px 16px;
  background: var(--bg-main);
  color: var(--text-main);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

.app {
  max-width: 1400px;
  margin: 0 auto;
}

h1, .subtitle { text-align: center; }
.subtitle { color: var(--text-dim); font-size: 1rem; margin: 8px 0 32px; }



/* =====================
   GRID
===================== */
.dex-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  width: 100%;
  max-width: 1200px;
  margin: 40px auto;
}

/* =====================
   CARD
===================== */
.entry {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: all 0.18s ease;
  box-shadow: var(--shadow);
  cursor: pointer;
}

.entry:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(255,255,255,0.14);
}

.card-image-container {
  height: 180px;              
  background: #0d0f14;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.card-image-container img {
  width: 100%;
  height: 100%;
  object-fit: contain;        
  object-position: center;
  padding: 12px;              
}

.entry-content {
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.entry-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
}

.entry-title {
  font-size: 1.32rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.stage {
  font-size: 0.78rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 999px;
  background: var(--bg-subtle);
  color: var(--text-dim);
  white-space: nowrap;
}

.types {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 12px 0 8px;
}

.type {
  padding: 5px 11px;
  font-size: 0.73rem;
  font-weight: 700;
  border-radius: 999px;
  border: 1.5px solid currentColor;
  letter-spacing: 0.02em;
}


.entry-desc {
  font-size: 0.86rem;
  line-height: 1.38;
  color: var(--text-dim);
  margin-top: 4px;
  flex-grow: 1;
}

.evo-strip {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 0.82rem;
  color: var(--text-dim);
}

.evo-strip strong {
  color: #d0d4dc;
  font-weight: 600;
}

.evo-strip ul {
  margin: 6px 0 0 18px;
  padding-left: 0;
  list-style: square;
}

/* Modal/
.modal {
  width: min(760px, 92vw);
  max-height: 90vh;
  overflow-y: auto;
  background: var(--bg-panel);
  border-radius: 20px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
   
</style>
</head>

<body>
<div class="app">

<h1>DIGIMON TRIALS DEX</h1>
<div class="subtitle">Fanmade Digimon ROM Hack</div>

<div class="nav">
  <a href="credits.html">CREDITS</a>
  <div class="dropdown">
    <button class="dropdown-toggle">GUIDE ▾</button>
    <div class="dropdown-menu">
      <a href="encounter.html">Encounters</a>
      <a href="faq.html">FAQ</a>
    </div>
  </div>
</div>

<input id="search" class="search-box" placeholder="Search Digimon...">

<div class="filters">
  <div class="filter-group">
    <label>Stage</label>
    <select id="stageFilter">
      <option value="">All</option>
      <option value="child">Child</option>
      <option value="adult">Adult</option>
      <option value="perfect">Perfect</option>
      <option value="mega">Mega</option>
      <option value="ultra">Ultra</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Type</label>
    <select id="typeFilter">
      <option value="">All</option>
      <option value="fire">Fire</option>
      <option value="water">Water</option>
      <option value="grass">Grass</option>
      <option value="electric">Electric</option>
      <option value="dark">Dark</option>
      <option value="holy">Holy</option>
      <option value="ground">Ground</option>
      <option value="rock">Rock</option>
      <option value="fairy">Fairy</option>
      <option value="undead">Undead</option>
      <option value="steel">Steel</option>
      <option value="poison">Poison</option>
      <option value="bug">Bug</option>
      <option value="magic">Magic</option>
      <option value="ice">Ice</option>
      <option value="flying">Flying</option>
      <option value="dragon">Dragon</option>
      <option value="mystery">Mystery</option>
    </select>
  </div>

  <button id="clearFilters">Clear Filters</button>
</div>

<div id="dex"></div>
</div>

<div id="overlay" class="overlay hidden">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* =====================
   STATE + DOM
===================== */
let DATA = [];

const dexEl = document.getElementById("dex");
const overlay = document.getElementById("overlay");
const searchInput = document.getElementById("search");
const stageFilter = document.getElementById("stageFilter");
const typeFilter = document.getElementById("typeFilter");
const clearBtn = document.getElementById("clearFilters");

/* =====================
   LOAD FROM digidex/
===================== */
async function loadDex() {
  try {
    const res = await fetch("digidex/index.json");
    if (!res.ok) throw new Error("Failed to load index.json");

    const { entries } = await res.json();
    if (!Array.isArray(entries)) throw new Error("Invalid index format");

    const loaded = [];

    for (const slug of entries) {
      try {
        const r = await fetch(`digidex/${slug}.json`);
        if (!r.ok) throw new Error();

        const data = await r.json();
        loaded.push(data);
      } catch {
        console.warn("Skipped broken entry:", slug);
      }
    }

    DATA = normalizeDex(loaded);
    render(DATA);

  } catch (err) {
    showError("DEX LOAD FAILED:\n\n" + err.message);
  }
}

loadDex();

/* =====================
   ERROR DISPLAY
===================== */
function showError(msg) {
  const div = document.createElement("div");
  div.style.cssText = `
    background:#4a0000;
    color:#ffcccc;
    padding:16px;
    margin:20px auto;
    max-width:720px;
    border-radius:10px;
    white-space:pre-wrap;
  `;
  div.textContent = msg;
  document.querySelector(".app").prepend(div);
}

/* =====================
   NORMALIZATION
===================== */
function normalizeDex(raw) {
  if (!Array.isArray(raw)) return [];

  const seen = new Set();
  const clean = [];

  for (const d of raw) {
    if (!d || typeof d !== "object") continue;
    if (!d.name || seen.has(d.name)) continue;

    seen.add(d.name);

    clean.push({
      name: String(d.name),
      stage: normalizeStage(d.stage),
      types: normalizeTypes(d.types),
      description: d.description || "(no description)",
      image: d.image ? `image/${d.image}` : null,
      abilities: Array.isArray(d.abilities) ? d.abilities : [],
      evolves_to: Array.isArray(d.evolves_to) ? d.evolves_to : []
    });
  }

  return clean.sort((a,b)=>a.name.localeCompare(b.name));
}

function normalizeStage(s) {
  if (!s) return "";
  const str = String(s).toLowerCase();
  if (str.includes("child") || str.includes("rookie")) return "child";
  if (str.includes("adult") || str.includes("champion")) return "adult";
  if (str.includes("perfect") || str.includes("ultimate")) return "perfect";
  if (str.includes("mega")) return "mega";
  if (str.includes("ultra")) return "ultra";
  return str;
}

function normalizeTypes(types) {
  if (!Array.isArray(types)) return [];
  return types.map(t => String(t).toLowerCase().trim()).filter(Boolean);
}

/* =====================
   RENDER
===================== */
function render(list) {
  dexEl.innerHTML = "";

  if (!list.length) {
    dexEl.innerHTML = `
      <div style="text-align:center; padding:60px; color:var(--text-dim);">
        No Digimon match your filters
      </div>`;
    return;
  }

  for (const d of list) {
    const card = document.createElement("div");
    card.className = "entry";

    card.innerHTML = `
      <div class="entry-header">
        <div class="entry-title">${d.name}</div>
        <div class="stage">${capitalize(d.stage) || "—"}</div>
      </div>

      ${d.image ? `
        <div style="text-align:center; margin:10px 0;">
          <img src="${d.image}"
               style="max-height:110px; max-width:100%; object-fit:contain;">
        </div>
      ` : ""}

      <div class="types">
        ${
          d.types.length
            ? d.types.map(t => `
                <span class="type ${t}">
                  ${capitalize(t)}
                </span>
              `).join("")
            : '<span style="opacity:.5">—</span>'
        }
      </div>

      <div class="entry-desc">${d.description}</div>

      <div class="evo-strip">
        <strong>Digivolves To</strong>
        ${
          d.evolves_to.length
            ? `<ul style="margin:4px 0 0 16px;">
                ${d.evolves_to.map(e =>
                  `<li>${e.name}${e.condition ? " — " + e.condition : ""}</li>`
                ).join("")}
              </ul>`
            : " —"
        }
      </div>
    `;

    card.addEventListener("click", () => openModal(d));
    dexEl.appendChild(card);
  }
}

/* =====================
   MODAL
===================== */
function openModal(d) {
  document.getElementById("modal-title").textContent = d.name;

  let html = `<p>${d.description}</p>`;

  if (d.abilities.length) {
    html += `
      <h3>Abilities</h3>
      <ul>
        ${d.abilities.map(a => `<li>${a}</li>`).join("")}
      </ul>`;
  }

  if (d.evolves_to.length) {
    html += `
      <h3>Evolution Path</h3>
      <ul>
        ${d.evolves_to.map(e =>
          `<li>${e.name}${e.condition ? " — " + e.condition : ""}</li>`
        ).join("")}
      </ul>`;
  }

  document.getElementById("modal-body").innerHTML = html;
  overlay.classList.remove("hidden");
}

overlay.addEventListener("click", e => {
  if (e.target === overlay) overlay.classList.add("hidden");
});

/* =====================
   FILTERING
===================== */
function applyFilters() {
  const q = searchInput.value.toLowerCase().trim();

  const filtered = DATA.filter(d => {
    const textBlob = (
      d.name +
      d.description +
      d.abilities.join("") +
      d.evolves_to.map(e => e.name + (e.condition || "")).join("")
    ).toLowerCase();

    const matchesSearch = !q || textBlob.includes(q);
    const matchesStage = !stageFilter.value || d.stage === stageFilter.value;
    const matchesType = !typeFilter.value || d.types.includes(typeFilter.value);

    return matchesSearch && matchesStage && matchesType;
  });

  render(filtered);
}

searchInput.addEventListener("input", applyFilters);
stageFilter.addEventListener("change", applyFilters);
typeFilter.addEventListener("change", applyFilters);

clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  stageFilter.value = "";
  typeFilter.value = "";
  render(DATA);
});

/* =====================
   UTIL
===================== */
function capitalize(str) {
  if (!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}
</script>
</body>
</html>
