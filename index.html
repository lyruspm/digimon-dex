<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digimon Trials Dex</title>


<style>
/* =====================
   THEME
===================== */
:root {
  --bg-main:    #0f1115;
  --bg-panel:   #171a21;
  --bg-card:    #1f2430;
  --bg-subtle:  #232838;
  --text-main:  #f2f4f8;
  --text-dim:   #a8b0c2;
  --border:     rgba(255,255,255,0.08);
}

/* =====================
   BASE
===================== */
body {
  margin: 0;
  padding: 20px 12px;
  background: var(--bg-main);
  color: var(--text-main);
  font-family: system-ui, -apple-system, sans-serif;
  line-height: 1.4;
}

.app {
  max-width: 1400px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  margin: 0 0 8px;
  font-size: 2.2rem;
}

.subtitle {
  text-align: center;
  color: var(--text-dim);
  font-size: 1rem;
  margin: 0 0 28px;
}

/* Search + Filters */
.search-box {
  display: block;
  margin: 20px auto;
  width: 100%;
  max-width: 680px;
  padding: 14px 16px;
  font-size: 1rem;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: white;
}

.filters {
  margin: 16px auto;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  align-items: flex-end;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.filter-group label {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.filter-group select {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: white;
  padding: 9px 11px;
  border-radius: 9px;
  min-width: 130px;
}

#clearFilters {
  height: 36px;
  padding: 0 20px;
  border-radius: 999px;
  background: #0b0d12;
  color: #d0d4dc;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
}

/* Nav */
.nav {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin: 20px 0 28px;
  flex-wrap: wrap;
}

.nav a, .dropdown-toggle {
  padding: 9px 18px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--text-main);
  text-decoration: none;
  font-size: 0.9rem;
  background: transparent;
}

.nav a:hover, .dropdown-toggle:hover {
  background: var(--bg-subtle);
}

/* =====================
   GRID + CARDS — main fixes here
===================== */
.dex-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin: 28px auto;
  max-width: 1240px;
  padding: 0 4px;
}

.entry {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  min-height: 360px;           /* gives more consistent starting height */
  transition: transform 0.16s ease, box-shadow 0.16s ease;
  box-shadow: 0 4px 14px rgba(0,0,0,0.28);
}

.entry:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.42);
}

/* Target the inline image wrapper directly */
.entry > div[style*="text-align:center; margin:10px 0;"] {
  height: 140px;                      /* controlled image area */
  display: flex !important;
  align-items: center;
  justify-content: center;
  background: #0b0d12;
  margin: 8px 0 12px !important;
  border-radius: 10px;
  overflow: hidden;
  padding: 8px;
  box-sizing: border-box;
}

.entry img {
  max-width: 100% !important;
  max-height: 100% !important;
  object-fit: contain;
  image-rendering: crisp-edges;
}

/* Header (name + stage) */
.entry-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 8px;
}

.entry-title {
  font-size: 1.28rem;
  font-weight: 800;
}

.stage {
  font-size: 0.78rem;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg-subtle);
  color: var(--text-dim);
  font-weight: 600;
  white-space: nowrap;
}

/* Types */
.types {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 6px 0 10px;
}

.type {
  padding: 4px 10px;
  font-size: 0.7rem;
  font-weight: 700;
  border-radius: 999px;
  border: 1.5px solid currentColor;
}

/* Description */
.entry-desc {
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.35;
  margin: 6px 0 12px;
  flex-grow: 1;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
}

/* Evo strip — push to bottom-ish */
.evo-strip {
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--text-dim);
}

.evo-strip strong {
  color: #ccd1db;
  font-weight: 600;
  display: block;
  margin-bottom: 4px;
}

.evo-strip ul {
  margin: 4px 0 0 16px;
  padding: 0;
  list-style: disc;
}

.evo-strip li {
  margin-bottom: 2px;
}

/* Modal */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal {
  width: min(90vw, 760px);
  max-height: 88vh;
  overflow-y: auto;
  background: var(--bg-panel);
  border-radius: 18px;
  padding: 24px;
}

/* Mobile */
@media (max-width: 540px) {
  .dex-grid {
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .entry {
    min-height: 380px;
  }
  .entry > div[style*="text-align:center; margin:10px 0;"] {
    height: 150px;
  }
}
</style>
</head>

<body>
<div class="app">

<h1>DIGIMON TRIALS DEX</h1>
<div class="subtitle">Fanmade Digimon ROM Hack</div>

<div class="nav">
  <a href="credits.html">CREDITS</a>
  <div class="dropdown">
    <button class="dropdown-toggle">GUIDE ▾</button>
    <div class="dropdown-menu">
      <a href="encounter.html">Encounters</a>
      <a href="faq.html">FAQ</a>
    </div>
  </div>
</div>

<input id="search" class="search-box" placeholder="Search Digimon...">

<div class="filters">
  <div class="filter-group">
    <label>Stage</label>
    <select id="stageFilter">
      <option value="">All</option>
      <option value="child">Child</option>
      <option value="adult">Adult</option>
      <option value="perfect">Perfect</option>
      <option value="mega">Mega</option>
      <option value="ultra">Ultra</option>
    </select>
  </div>

  <div class="filter-group">
    <label>Type</label>
    <select id="typeFilter">
      <option value="">All</option>
      <option value="fire">Fire</option>
      <option value="water">Water</option>
      <option value="grass">Grass</option>
      <option value="electric">Electric</option>
      <option value="dark">Dark</option>
      <option value="holy">Holy</option>
      <option value="ground">Ground</option>
      <option value="rock">Rock</option>
      <option value="fairy">Fairy</option>
      <option value="undead">Undead</option>
      <option value="steel">Steel</option>
      <option value="poison">Poison</option>
      <option value="bug">Bug</option>
      <option value="magic">Magic</option>
      <option value="ice">Ice</option>
      <option value="flying">Flying</option>
      <option value="dragon">Dragon</option>
      <option value="mystery">Mystery</option>
    </select>
  </div>

  <button id="clearFilters">Clear Filters</button>
</div>

<div id="dex"></div>
</div>

<div id="overlay" class="overlay hidden">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* =====================
   STATE + DOM
===================== */
let DATA = [];

const dexEl = document.getElementById("dex");
const overlay = document.getElementById("overlay");
const searchInput = document.getElementById("search");
const stageFilter = document.getElementById("stageFilter");
const typeFilter = document.getElementById("typeFilter");
const clearBtn = document.getElementById("clearFilters");

/* =====================
   LOAD FROM digidex/
===================== */
async function loadDex() {
  try {
    const res = await fetch("digidex/index.json");
    if (!res.ok) throw new Error("Failed to load index.json");

    const { entries } = await res.json();
    if (!Array.isArray(entries)) throw new Error("Invalid index format");

    const loaded = [];

    for (const slug of entries) {
      try {
        const r = await fetch(`digidex/${slug}.json`);
        if (!r.ok) throw new Error();

        const data = await r.json();
        loaded.push(data);
      } catch {
        console.warn("Skipped broken entry:", slug);
      }
    }

    DATA = normalizeDex(loaded);
    render(DATA);

  } catch (err) {
    showError("DEX LOAD FAILED:\n\n" + err.message);
  }
}

loadDex();

/* =====================
   ERROR DISPLAY
===================== */
function showError(msg) {
  const div = document.createElement("div");
  div.style.cssText = `
    background:#4a0000;
    color:#ffcccc;
    padding:16px;
    margin:20px auto;
    max-width:720px;
    border-radius:10px;
    white-space:pre-wrap;
  `;
  div.textContent = msg;
  document.querySelector(".app").prepend(div);
}

/* =====================
   NORMALIZATION
===================== */
function normalizeDex(raw) {
  if (!Array.isArray(raw)) return [];

  const seen = new Set();
  const clean = [];

  for (const d of raw) {
    if (!d || typeof d !== "object") continue;
    if (!d.name || seen.has(d.name)) continue;

    seen.add(d.name);

    clean.push({
      name: String(d.name),
      stage: normalizeStage(d.stage),
      types: normalizeTypes(d.types),
      description: d.description || "(no description)",
      image: d.image ? `image/${d.image}` : null,
      abilities: Array.isArray(d.abilities) ? d.abilities : [],
      evolves_to: Array.isArray(d.evolves_to) ? d.evolves_to : []
    });
  }

  return clean.sort((a,b)=>a.name.localeCompare(b.name));
}

function normalizeStage(s) {
  if (!s) return "";
  const str = String(s).toLowerCase();
  if (str.includes("child") || str.includes("rookie")) return "child";
  if (str.includes("adult") || str.includes("champion")) return "adult";
  if (str.includes("perfect") || str.includes("ultimate")) return "perfect";
  if (str.includes("mega")) return "mega";
  if (str.includes("ultra")) return "ultra";
  return str;
}

function normalizeTypes(types) {
  if (!Array.isArray(types)) return [];
  return types.map(t => String(t).toLowerCase().trim()).filter(Boolean);
}

/* =====================
   RENDER
===================== */
function render(list) {
  dexEl.innerHTML = "";

  if (!list.length) {
    dexEl.innerHTML = `
      <div style="text-align:center; padding:60px; color:var(--text-dim);">
        No Digimon match your filters
      </div>`;
    return;
  }

  for (const d of list) {
    const card = document.createElement("div");
    card.className = "entry";

    card.innerHTML = `
      <div class="entry-header">
        <div class="entry-title">${d.name}</div>
        <div class="stage">${capitalize(d.stage) || "—"}</div>
      </div>

      ${d.image ? `
        <div style="text-align:center; margin:10px 0;">
          <img src="${d.image}"
               style="max-height:110px; max-width:100%; object-fit:contain;">
        </div>
      ` : ""}

      <div class="types">
        ${
          d.types.length
            ? d.types.map(t => `
                <span class="type ${t}">
                  ${capitalize(t)}
                </span>
              `).join("")
            : '<span style="opacity:.5">—</span>'
        }
      </div>

      <div class="entry-desc">${d.description}</div>

      <div class="evo-strip">
        <strong>Digivolves To</strong>
        ${
          d.evolves_to.length
            ? `<ul style="margin:4px 0 0 16px;">
                ${d.evolves_to.map(e =>
                  `<li>${e.name}${e.condition ? " — " + e.condition : ""}</li>`
                ).join("")}
              </ul>`
            : " —"
        }
      </div>
    `;

    card.addEventListener("click", () => openModal(d));
    dexEl.appendChild(card);
  }
}

/* =====================
   MODAL
===================== */
function openModal(d) {
  document.getElementById("modal-title").textContent = d.name;

  let html = `<p>${d.description}</p>`;

  if (d.abilities.length) {
    html += `
      <h3>Abilities</h3>
      <ul>
        ${d.abilities.map(a => `<li>${a}</li>`).join("")}
      </ul>`;
  }

  if (d.evolves_to.length) {
    html += `
      <h3>Evolution Path</h3>
      <ul>
        ${d.evolves_to.map(e =>
          `<li>${e.name}${e.condition ? " — " + e.condition : ""}</li>`
        ).join("")}
      </ul>`;
  }

  document.getElementById("modal-body").innerHTML = html;
  overlay.classList.remove("hidden");
}

overlay.addEventListener("click", e => {
  if (e.target === overlay) overlay.classList.add("hidden");
});

/* =====================
   FILTERING
===================== */
function applyFilters() {
  const q = searchInput.value.toLowerCase().trim();

  const filtered = DATA.filter(d => {
    const textBlob = (
      d.name +
      d.description +
      d.abilities.join("") +
      d.evolves_to.map(e => e.name + (e.condition || "")).join("")
    ).toLowerCase();

    const matchesSearch = !q || textBlob.includes(q);
    const matchesStage = !stageFilter.value || d.stage === stageFilter.value;
    const matchesType = !typeFilter.value || d.types.includes(typeFilter.value);

    return matchesSearch && matchesStage && matchesType;
  });

  render(filtered);
}

searchInput.addEventListener("input", applyFilters);
stageFilter.addEventListener("change", applyFilters);
typeFilter.addEventListener("change", applyFilters);

clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  stageFilter.value = "";
  typeFilter.value = "";
  render(DATA);
});

/* =====================
   UTIL
===================== */
function capitalize(str) {
  if (!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}
</script>
</body>
</html>
